services:
  - type: web
    name: animateai-api
    env: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: FAL_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: REFRESH_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"

  - type: web
    name: animateai-frontend
    env: static
    rootDir: frontend
    buildCommand: ""
    staticPublishPath: .
